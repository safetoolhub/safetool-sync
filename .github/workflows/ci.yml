name: CI

# MANUAL TRIGGER ONLY — tests are NOT run automatically on push.
# Run this workflow from the GitHub Actions UI ("Run workflow" button).
# You can also trigger it via the GitHub CLI: gh workflow run ci.yml

on:
  workflow_dispatch:  # Manual trigger only

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install Qt system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libglib2.0-0 libdbus-1-3 \
            libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0

      - name: Create venv & install deps
        run: |
          uv venv
          uv pip install -r requirements.txt
          uv pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          uv run pytest tests/ -v --tb=short
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Check imports
        run: |
          uv run python -c "from config import Config; print(f'v{Config.get_full_version()}')"
          uv run python -c "from services.models import DiffType, SyncAction; print('Models OK')"
          uv run python -c "from i18n.core import init_i18n, tr; init_i18n('es'); print(tr('app.name'))"
